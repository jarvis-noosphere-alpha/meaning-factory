<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Комбайн Смыслов — Finbazar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0f0f; color: #d4af37; }
        .gold-border { border: 1px solid #d4af37; }
        .gold-bg { background-color: #d4af37; color: black; }
    </style>
</head>
<body class="p-5 font-sans">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center uppercase tracking-widest">Фабрика Смыслов</h1>
        <textarea id="inputText" class="w-full h-40 bg-black gold-border p-4 mb-4 rounded" placeholder="Вставьте вашу идею или тезисы..."></textarea>
        <button onclick="generate()" id="btn" class="w-full gold-bg font-bold py-4 rounded uppercase hover:opacity-80">Запустить комбайн</button>
        <div id="results" class="mt-8 space-y-6"></div>
    </div>
    <script>
        async function generate() {
            const text = document.getElementById('inputText').value;
            const btn = document.getElementById('btn');
            if(!text) return alert('Сначала введите текст!');
            btn.innerText = 'СМЫСЛЫ ГЕНЕРИРУЮТСЯ...';
            btn.disabled = true;
            // Здесь будет логика запроса к вашему серверу
            btn.innerText = 'ЗАПУСТИТЬ КОМБАЙН';
            btn.disabled = false;
        }
    </script>
</body>
</html>
